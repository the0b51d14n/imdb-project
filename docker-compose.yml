# ══════════════════════════════════════════════════════════════════════════════
#  docker-compose.yml — Supinfo.TV
#  Lance l'environnement complet : PHP-FPM + Nginx + MySQL
#
#  Démarrage : docker compose up -d
#  Arrêt     : docker compose down
#  Logs      : docker compose logs -f
#  Accès     : http://localhost
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── PHP-FPM ────────────────────────────────────────────────────────────────
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: supinfotv_php
    restart: unless-stopped
    volumes:
      - .:/var/www/html:ro          # lecture seule — le code ne peut pas être modifié depuis le container
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      # Transmis depuis le .env — jamais hardcodés ici
      APP_ENV:                    ${APP_ENV}
      APP_DEBUG:                  ${APP_DEBUG}
      APP_SECRET:                 ${APP_SECRET}
      DB_HOST:                    ${DB_HOST}
      DB_PORT:                    ${DB_PORT}
      DB_NAME:                    ${DB_NAME}
      DB_USER:                    ${DB_USER}
      DB_PASS:                    ${DB_PASS}
      TMDB_API_KEY:               ${TMDB_API_KEY}
      PRICE_HMAC_SECRET:          ${PRICE_HMAC_SECRET}
      CSRF_SECRET:                ${CSRF_SECRET}
      RATE_LIMIT_MAX_ATTEMPTS:    ${RATE_LIMIT_MAX_ATTEMPTS}
      RATE_LIMIT_DECAY_MINUTES:   ${RATE_LIMIT_DECAY_MINUTES}
      MAIL_HOST:                  ${MAIL_HOST}
      MAIL_PORT:                  ${MAIL_PORT}
      MAIL_USER:                  ${MAIL_USER}
      MAIL_PASS:                  ${MAIL_PASS}
      MAIL_FROM:                  ${MAIL_FROM}
      MAIL_FROM_NAME:             ${MAIL_FROM_NAME}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - supinfotv_network

  # ── NGINX ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: supinfotv_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - supinfotv_network

  # ── MYSQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: supinfotv_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASS}
      # Root password séparé — jamais identique au user password
      MYSQL_ROOT_PASSWORD: ${APP_SECRET}
    volumes:
      - mysql_data:/var/lib/mysql                     # données persistantes
      - ./backend/Database.sql:/docker-entrypoint-initdb.d/init.sql:ro  # schéma auto-chargé
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER}", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - supinfotv_network

# ── VOLUMES ───────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ── RÉSEAU ────────────────────────────────────────────────────────────────────
networks:
  supinfotv_network:
    driver: bridge