# ══════════════════════════════════════════════════════════════════════════════
#  docker/nginx/default.conf — Supinfo.TV
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name localhost;
    root /var/www/html/frontend;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 10M;

    # ── Logs ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Sécurité — Headers HTTP ──────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                    always;
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header X-XSS-Protection          "1; mode=block"           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Bloquer les fichiers sensibles ───────────────────────────────────────
    location ~ /\.env {
        deny all;
        return 404;
    }

    location ~ /\.git {
        deny all;
        return 404;
    }

    location ~ \.(sql|log|bak|backup|orig|old|pem|key|p12|pfx)$ {
        deny all;
        return 404;
    }

    # ── Assets statiques ─────────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Routes backend — réécriture vers /var/www/html/backend ───────────────
    location ^~ /backend/ {
        root /var/www/html;
        try_files $uri $uri/ =404;

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass   php:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
            include        fastcgi_params;
            fastcgi_read_timeout 60;
        }
    }

    # ── Routes frontend (racine) ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass   php:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME /var/www/html/frontend$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 60;
        fastcgi_buffer_size  128k;
        fastcgi_buffers      4 256k;
    }

    # ── Bloquer vendor/ ───────────────────────────────────────────────────────
    location ~ ^/(vendor|docker|\.github)/ {
        deny all;
        return 404;
    }

    # ── Pages d'erreur ────────────────────────────────────────────────────────
    error_page 404 /index.php;
    error_page 500 502 503 504 /index.php;
}